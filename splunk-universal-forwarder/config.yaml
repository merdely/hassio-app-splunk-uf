name: Splunk Universal Forwarder
version: "10.2.3"
slug: splunk_universal_forwarder
description: Runs a Splunk Universal Forwarder to ship logs to your Splunk deployment.
url: https://github.com/merdely/hassio-app-splunk-uf
arch:
  - amd64

startup: services
boot: auto

image: "ghcr.io/merdely/hassio-app-splunk-uf/splunk-universal-forwarder"

ports:
  9997/tcp: 9997
ports_description:
  9997/tcp: >-
    Splunk TCP input port (receiving data from other forwarders or syslog
    sources). Must match the 'tcp_port' option below.

options:
  deployment_server: ""
  tcp_listen: false
  tcp_port: 9997
  splunk_password: "ChangeMe1!"

schema:
  deployment_server: str
  tcp_listen: bool
  tcp_port: int
  splunk_password: str

map:
  - config:rw

tmpfs:
  - /tmp

panel_icon: mdi:magnify-scan
